name: Feature Request
description: Suggest an improvement or new feature
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the problem or gap this feature would address.
    validations:
      required: true

  - type: textarea
    id: desired
    attributes:
      label: Desired behavior
      description: What should happen? Keep it conceptual, not technical.
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional context (optional)
      description: Trade-offs, constraints, alternatives you considered, etc.
